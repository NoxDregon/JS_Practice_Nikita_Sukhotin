<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4 JS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Загрузка процессора</h1>
        
        <div class="graph-wrapper">
            <canvas id="cpuChart" width="800" height="400"></canvas>
        </div>
        
        <div class="stats">
            <div>
                <div class="stat-label">Всего запросов</div>
                <div class="stat-value" id="totalRequests">0</div>
            </div>
            <div>
                <div class="stat-label">Ошибок (0)</div>
                <div class="stat-value" id="errorCount">0</div>
            </div>
            <div>
                <div class="stat-label">Процент ошибок</div>
                <div class="stat-value" id="errorPercent">0.00%</div>
            </div>
            <div>
                <div class="stat-label">Текущее значение</div>
                <div class="stat-value" id="lastValue">—</div>
            </div>
        </div>
        
        <div class="info">
            Данные обновляются каждые 5 секунд | При ошибке (0) используется предыдущее значение
        </div>
    </div>
    <iframe id="apiFrame" style="display:none"></iframe>
    
    <script src="script.js"></script>
</body>
</html>
